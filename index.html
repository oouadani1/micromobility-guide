<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Micromobility Buyer's Guide</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>
  <main class="container">
    <section class="card">
      <p class="eyebrow">Micromobility Buyer's Guide</p>

<h1 id="heroTitle">Find a micromobility device that fits your needs.</h1>

     <p id="introText" class="intro">
  Micromobility devices are small, affordable, and flexible ways to get around, such as bikes, e-scooters, and more. Answer a few questions to see what devices could work well for you. 
    </p>  

      <div id="progress" class="recommendation-disclaimer"></div>

      <div id="formStep"></div>

      <div id="formNav" class="footer-branding form-nav" style="justify-content: space-between; margin-top: 24px;">
        <button id="backBtn" type="button" class="hidden" aria-label="Previous question">&#8249;</button>
        <button id="nextBtn" type="button" class="hidden" aria-label="Next question">&#8250;</button>
      </div>

      <div id="result" class="result hidden"></div>

      <div class="footer-branding">
        <img src="lab-logo-black.png" alt="The Lab at MassDOT logo" class="lab-logo">
        <p class="footer-note">Built by The Lab @ MassDOT</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
